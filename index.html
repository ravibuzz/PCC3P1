                text: "Homem de 67 anos, tabagista ativo (50 anos-maço), tem nódulo sólido de 15 mm no lobo superior direito, irregular e com sinal da cauda pleural.",
                question: "Segundo as Diretrizes de Fleischner, a avaliação do risco deste paciente e a conduta de escolha são:",
                options: [
                { letter: "A", text: "risco baixo (<5%); acompanhar o paciente com raios-X anuais." },
                { letter: "B", text: "risco intermediário (5-65%); prescrever antibiótico por 14 dias." },
                { letter: "C", text: "risco alto (>65%); o paciente deve ser submetido a investigação mais invasiva e estadiamento com PET-CT e/ou biópsia transtorácica." },
                { letter: "D", text: "risco altíssimo; indicação imediata de lobectomia direita de urgência sem biópsia prévia." }
                ],
                answer: "C",
                correctJustification: "Múltiplos fatores de alto risco (>65%): idade avançada, tabagismo pesado, nódulo > 8mm, irregular e lobo superior. A conduta exige investigação imediata com PET-CT ou biópsia.",
                distractorJustification: "Acompanhamento ou teste com antibióticos atrasa diagnóstico de câncer. Lobectomia não é feita sem estadiamento prévio."
            },
            {
                id: 27,
                theme: "NEOPLASIA PULMONAR E NÓDULOS",
                text: "Homem de 40 anos, não tabagista. Nódulo de 2 cm bem delimitado, contendo focos de gordura e calcificações em \"pipoca\".",
                question: "O diagnóstico mais provável para este achado radiológico benigno e sua composição tecidual é:",
                options: [
                { letter: "A", text: "tuberculose latente (granuloma); composto predominantemente por tecido necrótico caseoso e linfócitos." },
                { letter: "B", text: "lipoma intrapulmonar primário; tumor composto exclusivamente por proliferação de adipócitos maduros da parede brônquica." },
                { letter: "C", text: "hamartoma pulmonar; malformação composta por crescimento desorganizado de tecidos maduros normais do órgão, como cartilagem, gordura e epitélio respiratório." },
                { letter: "D", text: "carcinoma de grandes células; neoplasia maligna neuroendócrina produtora de calcificação paraneoplásica." }
                ],
                answer: "C",
                correctJustification: "Calcificações em pipoca e gordura são características patognomônicas de um Hamartoma Pulmonar (lesão benigna malformativa).",
                distractorJustification: "Granulomas têm calcificações diferentes e não têm gordura. Lipomas são só gordura. Carcinomas não têm essas bordas limpas e características benignas."
            },
            {
                id: 28,
                theme: "NEOPLASIA PULMONAR E NÓDULOS",
                text: "Homem de 58 anos com Adenocarcinoma de Pulmão à esquerda. PET-CT detecta infiltração nos linfonodos mediastinais do lado direito (contralaterais).",
                question: "Segundo a classificação TNM, o estágio linfonodal (N) desse paciente e sua operabilidade inicial são:",
                options: [
                { letter: "A", text: "estágio N1; o tumor deve ser operado imediatamente por lobectomia associada a linfadenectomia." },
                { letter: "B", text: "estágio N2; o paciente encontra-se no limite da operabilidade e deve receber quimioterapia neoadjuvante." },
                { letter: "C", text: "estágio N3; a doença é considerada irressecável inicialmente, sendo o tratamento padrão a quimiorradioterapia definitiva não operatória." },
                { letter: "D", text: "estágio Nx; a ausência de metástase distante (M0) garante a cura cirúrgica." }
                ],
                answer: "C",
                correctJustification: "Metástase em gânglios do lado oposto (contralateral) classifica-se como N3, o que torna a doença inoperável inicialmente (tratamento com quimiorradioterapia).",
                distractorJustification: "N1 e N2 referem-se ao mesmo lado da lesão. O estágio linfonodal dita a cirurgia independentemente de haver metástase a distância."

            {

                theme: "NEOPLASIA PULMONAR E NÓDULOS",
                text: "Homem de 55 anos tem nódulo único no pulmão, que é metástase de um câncer de cólon curado há 3 anos. Primário está controlado, sem outras metástases, reserva funcional pulmonar excelente.",
                question: "Com base nos critérios cirúrgicos para tratamento de metástases pulmonares, a equipe médica deve optar por:",
                options: [
                { letter: "A", text: "encaminhar para cuidados paliativos exclusivos." },
                { letter: "B", text: "indicar metastectomia cirúrgica com intuito curativo, pois os critérios de primário controlado, ausência de outra metástase e reserva funcional estão preenchidos." },
                { letter: "C", text: "prescrever radioterapia de tórax estritamente paliativa." },
                { letter: "D", text: "realizar lobectomia inferior direita acompanhada de quimioterapia neoadjuvante sistêmica." }
                ],
                answer: "B",
                correctJustification: "A metastectomia cirúrgica é altamente indicada com intenção curativa quando o tumor primário está controlado, não há outras metástases e o paciente tem reserva funcional adequada.",
                distractorJustification: "Cuidados paliativos e radioterapia são incorretos pois há chance de cura. Lobectomia extensa não é necessária, realiza-se ressecção econômica (cunha/segmentectomia)."
            },
            {
                id: 30,
                theme: "NEOPLASIA PULMONAR E NÓDULOS",
                text: "Mulher de 60 anos fará PET-Scan para estadiamento de câncer de pulmão.",
                question: "Qual é a base fisiológica e metabólica que permite ao PET-Scan diferenciar, na maioria dos casos, áreas tumorais de áreas de tecido saudável?",
                options: [
                { letter: "A", text: "As células neoplásicas têm maior metabolismo lipídico." },
                { letter: "B", text: "As células tumorais possuem menor metabolismo glicolítico que o tecido sadio." },
                { letter: "C", text: "As células neoplásicas exibem metabolismo acentuado com altíssima taxa de glicólise, captando e acumulando preferencialmente o radiofármaco fluorodesoxiglicose (18F-FDG)." },
                { letter: "D", text: "O tumor bloqueia a captação capilar pulmonar de íons de cálcio." }
                ],
                answer: "C",
                correctJustification: "O PET-Scan utiliza um radiofármaco (18F-FDG) análogo da glicose. Células de câncer têm altíssima taxa de glicólise (Efeito Warburg), captando e acumulando intensamente a glicose marcada (áreas hipermetabólicas).",
                distractorJustification: "O exame avalia o metabolismo da glicose (açúcar) que está acelerado no tumor, e não lipídeos, metabolismo reduzido ou cálcio."
            }
        ];

        // --- Componente Principal React ---
        function App() {
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [score, setScore] = useState(0);
            const [quizCompleted, setQuizCompleted] = useState(false);

            const handleRestart = () => {
                setCurrentQuestionIndex(0);
                setSelectedOption(null);
                setIsAnswered(false);
                setScore(0);
                setQuizCompleted(false);
            };

            const handleOptionSelect = (letter) => {
                if (!isAnswered) setSelectedOption(letter);
            };

            const handleAnswerSubmit = () => {
                if (selectedOption && !isAnswered) {
                    setIsAnswered(true);
                    if (selectedOption === quizData[currentQuestionIndex].answer) setScore(prev => prev + 1);
                }
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < quizData.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setSelectedOption(null);
                    setIsAnswered(false);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setQuizCompleted(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            if (quizCompleted) {
                const percentage = Math.round((score / quizData.length) * 100);
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-slate-800">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center border border-slate-100">
                            <Award className="w-20 h-20 mx-auto text-blue-600 mb-6" />
                            <h1 className="text-3xl font-bold mb-2">Simulado Concluído!</h1>
                            <p className="text-slate-500 mb-6">Aqui está o seu desempenho no ENAMED - PCC III</p>
                            
                            <div className="text-6xl font-extrabold text-blue-600 mb-2">
                                {score} <span className="text-2xl text-slate-400">/ {quizData.length}</span>
                            </div>
                            <p className="text-lg font-medium text-slate-600 mb-8">
                                Você acertou {percentage}% das questões.
                            </p>

                            <button onClick={handleRestart} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors">
                                <RotateCcw className="w-5 h-5" /> Refazer o Simulado
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQuestion = quizData[currentQuestionIndex];

            return (
                <div className="min-h-screen py-8 px-4 text-slate-800">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-8">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4">
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                        <BookOpen className="text-blue-600 w-6 h-6" /> ENAMED - PCC III
                                    </h1>
                                    <p className="text-sm font-medium text-slate-500 mt-1 uppercase tracking-wider">
                                        {currentQuestion.theme}
                                    </p>
                                </div>
                                <div className="mt-4 sm:mt-0 font-semibold text-blue-600 bg-blue-50 px-4 py-2 rounded-full border border-blue-100 shadow-sm">
                                    Questão {currentQuestionIndex + 1} de {quizData.length}
                                </div>
                            </div>
                            
                            <div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                                <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${((currentQuestionIndex) / quizData.length) * 100}%` }}></div>
                            </div>
                        </header>

                        <main className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div className="p-6 sm:p-8">
                                <p className="text-lg leading-relaxed mb-6 whitespace-pre-line text-slate-700">
                                    {currentQuestion.text}
                                </p>

                                {currentQuestion.table && (
                                    <div className="overflow-x-auto mb-6 rounded-lg border border-slate-200">
                                        <table className="w-full text-sm text-left text-slate-600">
                                            <thead className="bg-slate-50 text-slate-800 border-b border-slate-200">
                                                <tr>
                                                    {currentQuestion.table.headers.map((h, i) => (
                                                        <th key={i} className="px-4 py-3 font-semibold">{h}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {currentQuestion.table.rows.map((row, i) => (
                                                    <tr key={i} className="border-b border-slate-100 hover:bg-slate-50/50">
                                                        {row.map((cell, j) => (
                                                            <td key={j} className="px-4 py-3">{cell}</td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                <p className="text-xl font-bold text-slate-900 mb-6">
                                    {currentQuestion.question}
                                </p>

                                <div className="space-y-3">
                                    {currentQuestion.options.map((option) => {
                                        const isSelected = selectedOption === option.letter;
                                        const isCorrect = isAnswered && option.letter === currentQuestion.answer;
                                        const isWrongSelected = isAnswered && isSelected && !isCorrect;

                                        let optionClass = "border-slate-200 hover:border-blue-300 hover:bg-blue-50/50 bg-white";
                                        if (isSelected && !isAnswered) optionClass = "border-blue-500 bg-blue-50 ring-1 ring-blue-500";
                                        if (isCorrect) optionClass = "border-green-500 bg-green-50 ring-1 ring-green-500";
                                        if (isWrongSelected) optionClass = "border-red-500 bg-red-50 ring-1 ring-red-500";

                                        return (
                                            <button
                                                key={option.letter}
                                                onClick={() => handleOptionSelect(option.letter)}
                                                disabled={isAnswered}
                                                className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-4 ${optionClass} ${isAnswered ? 'cursor-default' : 'cursor-pointer'}`}
                                            >
                                                <span className={`flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm shadow-sm
                                                    ${isCorrect ? 'bg-green-500 text-white' : isWrongSelected ? 'bg-red-500 text-white' : isSelected ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>
                                                    {option.letter}
                                                </span>
                                                <span className={`text-base leading-relaxed mt-0.5 ${isCorrect ? 'text-green-900 font-medium' : isWrongSelected ? 'text-red-900' : 'text-slate-700'}`}>
                                                    {option.text}
                                                </span>
                                                {isCorrect && <CheckCircle2 className="w-6 h-6 text-green-500 ml-auto flex-shrink-0 mt-1" />}
                                                {isWrongSelected && <XCircle className="w-6 h-6 text-red-500 ml-auto flex-shrink-0 mt-1" />}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="bg-slate-50 border-t border-slate-200 p-6 sm:px-8 flex items-center justify-between">
                                {!isAnswered ? (
                                    <button onClick={handleAnswerSubmit} disabled={!selectedOption} className={`w-full sm:w-auto px-8 py-3 rounded-xl font-bold transition-colors shadow-sm ${selectedOption ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                        Responder
                                    </button>
                                ) : (
                                    <button onClick={handleNextQuestion} className="w-full sm:w-auto ml-auto px-8 py-3 rounded-xl font-bold bg-slate-900 hover:bg-slate-800 text-white shadow-md flex items-center justify-center gap-2 transition-colors">
                                        {currentQuestionIndex < quizData.length - 1 ? 'Próxima Questão' : 'Finalizar Simulado'} <ArrowRight className="w-5 h-5" />
                                    </button>
                                )}
                            </div>
                        </main>

                        {isAnswered && (
                            <div className={`rounded-2xl shadow-sm border p-6 sm:p-8 transition-all ${selectedOption === currentQuestion.answer ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                <div className="flex items-center gap-3 mb-4">
                                    {selectedOption === currentQuestion.answer ? (
                                        <><CheckCircle2 className="w-8 h-8 text-green-600" /><h2 className="text-2xl font-bold text-green-900">Você Acertou!</h2></>
                                    ) : (
                                        <><XCircle className="w-8 h-8 text-red-600" /><h2 className="text-2xl font-bold text-red-900">Alternativa Incorreta</h2></>
                                    )}
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                        <h3 className="text-sm font-bold text-blue-600 uppercase tracking-wider flex items-center gap-2 mb-2">
                                            <CheckCircle2 className="w-4 h-4" /> Justificativa da Correta (Gabarito: {currentQuestion.answer})
                                        </h3>
                                        <p className="text-slate-700 leading-relaxed">{currentQuestion.correctJustification}</p>
                                    </div>

                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2 mb-2">
                                            <AlertCircle className="w-4 h-4" /> Análise das Distratoras
                                        </h3>
                                        <p className="text-slate-600 leading-relaxed whitespace-pre-line">{currentQuestion.distractorJustification}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- Renderização ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
